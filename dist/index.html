<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!--
      width=1920 → force VIDAA OS to render at full 1080p
      Never use responsive viewport on Smart TV
    -->
    <meta name="viewport" content="width=1920" />
    <meta name="description" content="Vid30 — Films IA sur VIDAA OS" />
    <title>VID30</title>
    <!--
      Preload critical fonts — TV has no internet cache,
      font flash (FOUT) is very visible on big screens
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap"
      rel="stylesheet"
    />
    <!--
      hls.js loaded from CDN — ~30KB, only lib we need.
      async defer so it doesn't block first paint.
    -->
    <script
      src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"
      defer
    ></script>
    <script type="module" crossorigin src="/assets/index-CyPDushm.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DVouc4e8.css">
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
